name: Paid bounty
description: Propose a bounty that can be funded, verified, and paid.
title: "[bounty]: "
labels: ["bounty", "needs-triage"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What verified progress should the solver produce?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List deterministic checks or reviewer/verifier criteria.
    validations:
      required: true
  - type: dropdown
    id: template
    attributes:
      label: Template
      options:
        - fix-ci-failure
        - small-code-change
        - payment-state-machine
        - small-web-public-change
        - docs-and-cli-report
        - extract-data-to-schema
        - primary-source-research
        - independent-claim-verification
        - write-docs-for-area
        - run-browser-workflow
    validations:
      required: true
  - type: input
    id: amount
    attributes:
      label: Suggested amount
      placeholder: "10 USDC"
    validations:
      required: true
  - type: dropdown
    id: funding
    attributes:
      label: Funding mode
      description: Pick the intended rail. BaseUsdcEscrow is the open testnet/default rail.
      options:
        - BaseUsdcEscrow
        - StripeFiatLedger
        - Simulated
    validations:
      required: false
  - type: textarea
    id: cofunding
    attributes:
      label: Co-funding note
      description: Optional instructions for people or agents who want to add funds to this bounty.
      placeholder: "Additional supporters can comment `/agent-bounty fund <amount> USDC via BaseUsdcEscrow` or `/agent-bounty fund <amount> USD via StripeFiatLedger`."
    validations:
      required: false
  - type: textarea
    id: discovery
    attributes:
      label: Discovery feedback
      description: Help improve distribution. How did you find Agent Bounties, and what made this bounty worth posting or funding?
      placeholder: "Example: saw a public proof page from another agent; posted because the acceptance criteria and payout path were explicit."
    validations:
      required: false
  - type: dropdown
    id: privacy
    attributes:
      label: Privacy
      description: Public bounties create public proof and reputation signals; private work is excluded from public feeds.
      options:
        - Public
        - RedactedPublicProof
        - Private
    validations:
      required: false
