name: Bounty inventory guard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/bounty_inventory_guard.py"
      - "scripts/test_bounty_inventory_guard.py"
      - "scripts/reconcile_github_bounty_labels.py"
      - "scripts/test_reconcile_github_bounty_labels.py"
      - "scripts/fixtures/bounty_inventory_*.json"
      - "skills/agent-bounties/scripts/check-in.mjs"
      - "docs/standing-meta-bounty-invariant.md"
      - ".github/workflows/bounty-inventory-guard.yml"

permissions:
  contents: read
  issues: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run inventory guard unit tests
        run: |
          python scripts/test_bounty_inventory_guard.py -v
          python scripts/test_reconcile_github_bounty_labels.py -v

  reconcile-status-labels:
    if: github.event_name != 'pull_request'
    needs: unit-tests
    runs-on: ubuntu-latest
    concurrency:
      group: canonical-github-bounty-reconciliation
      cancel-in-progress: false
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Reconcile GitHub state from canonical Base evidence
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/reconcile_github_bounty_labels.py \
            --execute \
            --confirm-repository "$GITHUB_REPOSITORY" \
            --json-out bounty-label-reconciliation.json \
            --md-out bounty-label-reconciliation.md
          cat bounty-label-reconciliation.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload reconciliation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bounty-label-reconciliation
          path: |
            bounty-label-reconciliation.json
            bounty-label-reconciliation.md

  live-report:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build canonical claimable inventory report
        run: node skills/agent-bounties/scripts/check-in.mjs > claimable-inventory.json
      - name: Report verified claimable inventory floor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BOUNTY_INVENTORY_THRESHOLD: "5"
          META_BOUNTY_INVENTORY_THRESHOLD: "5"
          META_BOUNTY_REPLENISHMENT_TARGET: "5"
        run: |
          python scripts/bounty_inventory_guard.py \
            --claimable-report claimable-inventory.json \
            --json-out bounty-inventory-report.json \
            --md-out bounty-inventory-report.md
      - name: Enforce claimable and standing meta-bounty floors
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("bounty-inventory-report.json").read_text())
          status = (
              f"verified claimable bounties: {report['verified_claimable_count']}/"
              f"{report['threshold']}; protocol={report['protocol_status']}; "
              f"evidence_valid={str(report['inventory_evidence_valid']).lower()}"
          )
          meta_status = (
              f"standing meta-bounties: {report['verified_meta_claimable_count']}/"
              f"{report['meta_threshold']} floor; "
              f"target={report['meta_replenishment_target']}"
          )
          if report["below_threshold"]:
              print(f"::error title=Bounty inventory invariant not met::{status}; {meta_status}")
          elif report["meta_replenishment_required"]:
              print(f"::warning title=Standing meta-bounty buffer needs replenishment::{meta_status}")
          else:
              print(f"{status}; {meta_status}")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## Claimable bounty liquidity\n\n")
              summary.write(f"- {status}\n")
              summary.write(f"- {meta_status}\n")
              summary.write(f"- below threshold: {str(report['below_threshold']).lower()}\n")
              summary.write(
                  "- meta replenishment required: "
                  f"{str(report['meta_replenishment_required']).lower()}\n"
              )
              summary.write("- GitHub issues are candidate supply, not funding evidence.\n")
          if report["below_threshold"]:
              raise SystemExit(2)
          PY
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bounty-inventory-report
          path: |
            bounty-inventory-report.json
            bounty-inventory-report.md
            claimable-inventory.json
