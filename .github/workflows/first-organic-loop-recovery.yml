name: First Organic Loop Recovery

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/first-organic-loop-recovery.yml"
      - "scripts/recover_first_organic_loop.py"
      - "scripts/test_recover_first_organic_loop.py"
  pull_request:
    paths:
      - ".github/workflows/first-organic-loop-recovery.yml"
      - "scripts/recover_first_organic_loop.py"
      - "scripts/test_recover_first_organic_loop.py"

permissions:
  contents: read

concurrency:
  group: first-organic-loop-recovery
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run deterministic recovery tests
        run: python scripts/test_recover_first_organic_loop.py

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - name: Check pinned Base mainnet recovery state without signing
        env:
          BASE_MAINNET_RPC_URL: ${{ vars.BASE_MAINNET_RPC_URL || 'https://mainnet.base.org' }}
        run: python scripts/recover_first_organic_loop.py

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: first-organic-loop-recovery-check
          path: target/first-organic-loop-recovery.json
          if-no-files-found: error

  recover:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - name: Recover the protected solver bond when due
        env:
          BASE_KEEPER_PRIVATE_KEY: ${{ secrets.BASE_KEEPER_PRIVATE_KEY }}
          BASE_MAINNET_RPC_URL: ${{ vars.BASE_MAINNET_RPC_URL || 'https://mainnet.base.org' }}
        run: python scripts/recover_first_organic_loop.py --execute

      - name: Publish canonical recovery evidence once
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          outcome="$(python -c 'import json; print(json.load(open("target/first-organic-loop-recovery.json"))["outcome"])')"
          if [[ "$outcome" != "recovered" ]]; then
            exit 0
          fi
          transaction_hash="$(python -c 'import json; print(json.load(open("target/first-organic-loop-recovery.json"))["transaction_hash"])')"
          body="The permissionless timeout recovery executed after the committed deadline. Canonical transaction: https://basescan.org/tx/${transaction_hash}\n\nThe `SubmissionExpired` event returned the protected 0.10 USDC claim bond to solver `0x65E3...0154`. This is bond recovery, not the 1.00 USDC bounty reward and not a `BountySettled` payment."
          gh api repos/NSPG13/agent-bounties/issues/169/comments -f body="$body"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: first-organic-loop-recovery-execution
          path: target/first-organic-loop-recovery.json
          if-no-files-found: error
