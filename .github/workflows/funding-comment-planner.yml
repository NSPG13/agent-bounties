name: Funding Comment Planner

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  plan-funding-comment:
    if: >-
      contains(github.event.issue.labels.*.name, 'bounty') &&
      startsWith(github.event.comment.body, '/agent-bounty fund')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run funding-comment planner
        id: planner
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          python3 scripts/funding_comment_planner.py --github-event > planner_result.md

      - name: Post planner result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('planner_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
