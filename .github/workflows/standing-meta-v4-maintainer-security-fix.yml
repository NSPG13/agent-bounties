name: Temporary standing-meta V4 maintainer security fix

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-runner:
    if: >-
      github.event.pull_request.head.ref == 'ops/repair-v4-maintainer-security-fix-runner' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Compile the standalone exact-edit runners
        run: >-
          python -m py_compile
          .github/scripts/apply_standing_meta_v4_security_review.py
          .github/scripts/apply_standing_meta_v4_security_review_followup.py
          .github/scripts/apply_standing_meta_v4_security_review_protocol_contracts.py
          .github/scripts/apply_standing_meta_v4_security_review_protocol_regressions.py
          .github/scripts/apply_standing_meta_v4_security_review_window_regression.py

  patch-and-test:
    if: >-
      github.event.pull_request.head.ref == 'ops/trigger-v4-maintainer-security-fix' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == 'NSPG13'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a
        with:
          ref: agent/standing-meta-v4-contracts
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Require the reviewed source revision
        run: test "$(git rev-parse HEAD)" = "686282e7463703ea403f9baa2c73a28d4c766802"

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Materialize the reviewed runners from the protected default branch
        run: |
          git fetch origin main
          git show origin/main:.github/scripts/apply_standing_meta_v4_security_review.py > /tmp/apply_v4_security.py
          git show origin/main:.github/scripts/apply_standing_meta_v4_security_review_followup.py > /tmp/apply_v4_security_followup.py
          git show origin/main:.github/scripts/apply_standing_meta_v4_security_review_protocol_contracts.py > /tmp/apply_v4_security_protocol_contracts.py
          git show origin/main:.github/scripts/apply_standing_meta_v4_security_review_protocol_regressions.py > /tmp/apply_v4_security_protocol_regressions.py
          git show origin/main:.github/scripts/apply_standing_meta_v4_security_review_window_regression.py > /tmp/apply_v4_security_window_regression.py
          python -m py_compile \
            /tmp/apply_v4_security.py \
            /tmp/apply_v4_security_followup.py \
            /tmp/apply_v4_security_protocol_contracts.py \
            /tmp/apply_v4_security_protocol_regressions.py \
            /tmp/apply_v4_security_window_regression.py

      - name: Apply bounded maintainer security fixes and adversarial regressions
        run: |
          python /tmp/apply_v4_security.py
          python /tmp/apply_v4_security_followup.py
          python /tmp/apply_v4_security_protocol_contracts.py
          python /tmp/apply_v4_security_protocol_regressions.py
          python /tmp/apply_v4_security_window_regression.py

      - name: Format contracts
        run: forge fmt --root contracts/base-escrow

      - name: Targeted adversarial and protocol tests
        run: >-
          forge test --root contracts/base-escrow
          --match-contract '(AnonymousStakeAndVrfSortitionTest|AppealableVerifierV1Test|StandingMetaV4Test)'
          --fuzz-runs 1000 -vv

      - name: Contract sizes and Python release tooling tests
        run: |
          forge build --root contracts/base-escrow --sizes
          python -m unittest scripts.test_standing_meta_v4_deploy -v
          python -m py_compile scripts/standing_meta_v4_deploy.py scripts/test_standing_meta_v4_deploy.py
          git diff --check

      - name: Commit only the tested V4 security patch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            contracts/base-escrow/script/FundStandingMetaV4Subscription.s.sol \
            contracts/base-escrow/src/AnonymousProtocolControllerV1.sol \
            contracts/base-escrow/src/AnonymousStakePoolV1.sol \
            contracts/base-escrow/src/AppealableVerifierV1.sol \
            contracts/base-escrow/src/StandingMetaChildFactoryV4.sol \
            contracts/base-escrow/src/StandingMetaChildV4.sol \
            contracts/base-escrow/src/StandingMetaParentFactoryV4.sol \
            contracts/base-escrow/src/StandingMetaParentV4.sol \
            contracts/base-escrow/test/AnonymousStakeAndVrfSortition.t.sol \
            contracts/base-escrow/test/AppealableVerifierV1.t.sol \
            contracts/base-escrow/test/StandingMetaV4.t.sol \
            docs/security/standing-meta-v4-slither-triage.md \
            docs/security/standing-meta-v4-threat-model.md \
            docs/standing-meta-v4-fair-earning.md \
            scripts/standing_meta_v4_deploy.py \
            scripts/test_standing_meta_v4_deploy.py
          git commit -m "fix: harden standing-meta v4 trust and accounting boundaries"
          git push origin HEAD:agent/standing-meta-v4-contracts
          gh pr comment 536 --body "Maintainer security patch pushed after targeted adversarial tests, 1,000-run fuzzing, contract-size checks, Python release-tooling tests, syntax checks, and diff validation. This is maintainer review evidence only; the independent R4 reviewer and protected-environment gates remain open."
