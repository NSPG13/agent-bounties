name: Standing meta v3 deploy

on:
  pull_request:
    paths:
      - ".github/workflows/standing-meta-v3-deploy.yml"
      - ".github/workflows/activate-standing-meta-v3-replacements.yml"
      - "contracts/base-escrow/src/CanonicalIndependentChildVerifierV3.sol"
      - "contracts/base-escrow/src/StandingMetaV3Bundle.sol"
      - "contracts/base-escrow/test/CanonicalIndependentChildVerifierV3.t.sol"
      - "scripts/standing_meta_v3_deploy.py"
      - "scripts/test_standing_meta_v3_deploy.py"
      - "scripts/activate_standing_meta_v3_replacements.py"
      - "scripts/test_activate_standing_meta_v3_replacements.py"
      - "site/standing-meta-v3-migration.html"
      - "site/standing-meta-v3-migration.js"
      - "bounties/autonomous-v1/v3-*.json"
      - "docs/standing-meta-v3-profit-invariant.md"
  push:
    branches: [main]
    paths:
      - ".github/workflows/standing-meta-v3-deploy.yml"
      - ".github/workflows/activate-standing-meta-v3-replacements.yml"
      - "contracts/base-escrow/src/CanonicalIndependentChildVerifierV3.sol"
      - "contracts/base-escrow/src/StandingMetaV3Bundle.sol"
      - "contracts/base-escrow/test/CanonicalIndependentChildVerifierV3.t.sol"
      - "scripts/standing_meta_v3_deploy.py"
      - "scripts/test_standing_meta_v3_deploy.py"
      - "scripts/activate_standing_meta_v3_replacements.py"
      - "scripts/test_activate_standing_meta_v3_replacements.py"
      - "site/standing-meta-v3-migration.html"
      - "site/standing-meta-v3-migration.js"
      - "bounties/autonomous-v1/v3-*.json"
      - "docs/standing-meta-v3-profit-invariant.md"
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: standing-meta-v3-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deterministic-gates:
    if: >-
      github.event_name != 'issue_comment'
      || (
        github.event.issue.pull_request == null
        && github.event.issue.number == 527
        && github.event.comment.user.login == 'NSPG13'
        && github.event.comment.body == '/agent-bounty deploy-v3-policy'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: V3 deployment helper tests
        run: python -m unittest scripts.test_standing_meta_v3_deploy -v

      - name: V3 activation economics assertion
        run: python -m unittest scripts.test_activate_standing_meta_v3_replacements.ActivateStandingMetaV3Tests.test_migration_economics_are_exact -v

      - name: V3 creation payload assertion
        run: python -m unittest scripts.test_activate_standing_meta_v3_replacements.ActivateStandingMetaV3Tests.test_create_payload_uses_published_commitments_and_v3 -v

      - name: V3 issue evidence assertion
        run: python -m unittest scripts.test_activate_standing_meta_v3_replacements.ActivateStandingMetaV3Tests.test_issue_body_advertises_profit_and_evidence_boundary -v

      - name: V3 temporary policy assertion
        run: python -m unittest scripts.test_activate_standing_meta_v3_replacements.ActivateStandingMetaV3Tests.test_policy_constants_are_minimally_bounded -v

      - name: Python syntax
        run: python -m py_compile scripts/standing_meta_v3_deploy.py scripts/activate_standing_meta_v3_replacements.py

      - name: Owner migration page JavaScript syntax
        run: node --check site/standing-meta-v3-migration.js

      - name: Autonomous wallet compatibility contract
        run: node scripts/test-autonomous-wallet-flow.js

      - name: V3 contract tests
        run: forge test --root contracts/base-escrow --match-contract CanonicalIndependentChildVerifierV3Test -vv

      - name: V3 contract build and size
        run: forge build --root contracts/base-escrow --sizes

      - name: Read-only Base activation and funding preflight
        env:
          BASE_MAINNET_RPC_URL: ${{ vars.BASE_MAINNET_RPC_URL || 'https://mainnet.base.org' }}
        run: >-
          python scripts/standing_meta_v3_deploy.py plan
          --output target/standing-meta-v3-plan.json
          --markdown-output target/standing-meta-v3-plan.md

      - name: Publish pull-request preflight
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file target/standing-meta-v3-plan.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: standing-meta-v3-plan-${{ github.sha }}
          path: |
            target/standing-meta-v3-plan.json
            target/standing-meta-v3-plan.md
          if-no-files-found: error

  base-mainnet-deploy:
    if: >-
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request == null
        && github.event.issue.number == 527
        && github.event.comment.user.login == 'NSPG13'
        && github.event.comment.body == '/agent-bounty deploy-v3-policy'
      )
    needs: deterministic-gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      BASE_KEEPER_PRIVATE_KEY: ${{ secrets.BASE_KEEPER_PRIVATE_KEY }}
      BASE_MAINNET_RPC_URL: ${{ vars.BASE_MAINNET_RPC_URL || 'https://mainnet.base.org' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Announce bounded deployment attempt
        run: |
          cat > /tmp/v3-deploy-start.md <<EOF
          ## Standing-meta-v3 deployment started

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The workflow will post confirmed immutable evidence on success or an explicit failure notice. This start notice is not deployment evidence.
          EOF
          gh issue comment 527 --body-file /tmp/v3-deploy-start.md

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Deterministically deploy and attest standing-meta-v3
        run: >-
          python scripts/standing_meta_v3_deploy.py deploy
          --output target/standing-meta-v3-deployment.json
          --markdown-output target/standing-meta-v3-plan.md

      - name: Publish deployment evidence to migration issue
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('target/standing-meta-v3-deployment.json').read_text())
          verification = report['verification']
          transaction = report.get('transaction') or {}
          tx_hash = transaction.get('transactionHash') or transaction.get('transaction_hash')
          lines = [
              '## Standing-meta-v3 Base deployment reconciled',
              '',
              f"- Verifier module: `{verification['verifier_module']}`",
              f"- Runtime code hash: `{verification['runtime_code_hash']}`",
              f"- Acceptance criteria hash: `{verification['acceptance_criteria_hash']}`",
              f"- Deployment transaction: `{tx_hash}`" if tx_hash else '- Deployment was already present and re-attested idempotently.',
              '- Child floor: **1.00 USDC**',
              '- Guaranteed parent gross-margin floor: **1.00 USDC**',
              '',
              'This proves policy deployment only. It does not prove that replacement parents are created, funded, claimable, or paid.',
          ]
          Path('target/standing-meta-v3-deployment.md').write_text('\n'.join(lines) + '\n')
          PY
          gh issue comment 527 --body-file target/standing-meta-v3-deployment.md

      - name: Publish explicit deployment failure
        if: failure()
        run: |
          cat > /tmp/v3-deploy-failure.md <<EOF
          ## Standing-meta-v3 deployment failed

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          No V3 deployment is being claimed. Inspect the failed step and artifact before retrying.
          EOF
          gh issue comment 527 --body-file /tmp/v3-deploy-failure.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: standing-meta-v3-mainnet-${{ github.sha }}
          path: |
            target/standing-meta-v3-plan.json
            target/standing-meta-v3-plan.md
            target/standing-meta-v3-deployment.json
            target/standing-meta-v3-deployment.md
          if-no-files-found: warn
