name: Render Deploy Recovery

on:
  pull_request:
    paths:
      - ".github/workflows/render-deploy-recovery.yml"
      - "render.yaml"
      - "scripts/check-render-blueprint.py"
      - "scripts/render_deploy_recovery.py"
      - "scripts/test_render_deploy_recovery.py"
      - "docs/deployment.md"
      - "docs/software-development-lifecycle.md"
      - "docs/self-healing-operations.md"
      - "ops/self-healing-policy.json"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      revision:
        description: "Controller SHA; defaults to the dispatch revision"
        required: false
        type: string
      deploy_mode:
        description: "Build the controller SHA or redeploy the verified current artifact"
        required: false
        default: build_and_deploy
        type: choice
        options:
          - build_and_deploy
          - deploy_only
      runtime_revision:
        description: "Exact current production SHA; required for deploy_only"
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  controller-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.revision || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify deterministic deploy controller
        run: |
          python scripts/test_render_deploy_recovery.py -v
          python scripts/check-render-blueprint.py
          python -m py_compile \
            scripts/render_deploy_recovery.py \
            scripts/test_render_deploy_recovery.py

  deploy-exact-main-revision:
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      github.event_name == 'workflow_dispatch'
    needs: controller-contract
    runs-on: ubuntu-latest
    timeout-minutes: 50
    concurrency:
      group: render-production-deploy
      cancel-in-progress: false
    env:
      TARGET_REVISION: ${{ github.event.workflow_run.head_sha || inputs.revision || github.sha }}
      REQUESTED_DEPLOY_MODE: ${{ inputs.deploy_mode || 'build_and_deploy' }}
      RUNTIME_REVISION: ${{ inputs.runtime_revision }}
      PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL || 'https://api.bountyboard.global' }}
      PRODUCTION_MCP_BASE_URL: ${{ vars.PRODUCTION_MCP_BASE_URL || 'https://mcp.bountyboard.global' }}
      PRODUCTION_WEBSITE_BASE_URL: ${{ vars.PRODUCTION_WEBSITE_BASE_URL || 'https://bountyboard.global' }}
      RENDER_DEPLOY_PAUSE_REASON: ${{ vars.RENDER_DEPLOY_PAUSE_REASON }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REVISION }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Select latest successful main revision
        id: target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${REQUESTED_DEPLOY_MODE}" != "build_and_deploy" && "${REQUESTED_DEPLOY_MODE}" != "deploy_only" ]]; then
            echo "Unsupported deploy mode" >&2
            exit 1
          fi
          if [[ "${REQUESTED_DEPLOY_MODE}" == "deploy_only" && "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
            echo "deploy_only is manual recovery only" >&2
            exit 1
          fi
          if [[ -n "${RENDER_DEPLOY_PAUSE_REASON}" ]]; then
            if [[ ! "${RENDER_DEPLOY_PAUSE_REASON}" =~ ^[a-z0-9_-]{1,80}$ ]]; then
              echo "RENDER_DEPLOY_PAUSE_REASON has an invalid format" >&2
              exit 1
            fi
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Render deployment paused: ${RENDER_DEPLOY_PAUSE_REASON}. Render quota-gates build_and_deploy and deploy_only. Restore capacity, clear the repository variable, then dispatch this workflow." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ ! "${TARGET_REVISION}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "TARGET_REVISION must be an exact 40-character Git SHA" >&2
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          current_main="$(git rev-parse refs/remotes/origin/main)"
          if ! git merge-base --is-ancestor "${TARGET_REVISION}" "${current_main}"; then
            echo "TARGET_REVISION is not reachable from current main" >&2
            exit 1
          fi

          latest_successful=""
          for attempt in 1 2 3; do
            latest_successful="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&status=success&per_page=20" \
                --jq '.workflow_runs | map(select(.conclusion == "success")) | .[0].head_sha // empty'
            )"
            if [[ "${attempt}" -lt 3 ]]; then
              sleep $((attempt * 2))
            fi
          done
          if [[ ! "${latest_successful}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "GitHub did not return a successful main CI revision" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${latest_successful}" "${current_main}"; then
            echo "Latest successful CI revision is not reachable from current main" >&2
            exit 1
          fi
          if [[ "${TARGET_REVISION,,}" != "${latest_successful,,}" ]]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Latest successful main CI is ${latest_successful}; that revision owns deployment." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          deployment_revision="${TARGET_REVISION,,}"
          if [[ "${REQUESTED_DEPLOY_MODE}" == "deploy_only" ]]; then
            if [[ ! "${RUNTIME_REVISION}" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "RUNTIME_REVISION must be an exact 40-character Git SHA for deploy_only" >&2
              exit 1
            fi
            if ! git merge-base --is-ancestor "${RUNTIME_REVISION}" "${current_main}"; then
              echo "RUNTIME_REVISION is not reachable from current main" >&2
              exit 1
            fi
            deployment_revision="${RUNTIME_REVISION,,}"
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=${REQUESTED_DEPLOY_MODE}" >> "$GITHUB_OUTPUT"
          echo "deployment_revision=${deployment_revision}" >> "$GITHUB_OUTPUT"

      - name: Deploy and attest exact revision
        if: steps.target.outputs.deploy == 'true'
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          CLOUD_AGENT_API_KEY: ${{ secrets.CLOUD_AGENT_API_KEY }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          NEYNAR_BOT_FID: ${{ vars.NEYNAR_BOT_FID }}
          NEYNAR_BOT_USERNAME: ${{ vars.NEYNAR_BOT_USERNAME }}
          BASE_MAINNET_LEADERBOARD_REWARD_CONTRACT: ${{ vars.BASE_MAINNET_LEADERBOARD_REWARD_CONTRACT }}
          BASE_SEPOLIA_LEADERBOARD_REWARD_CONTRACT: ${{ vars.BASE_SEPOLIA_LEADERBOARD_REWARD_CONTRACT }}
        run: |
          python scripts/render_deploy_recovery.py \
            --revision "${{ steps.target.outputs.deployment_revision }}" \
            --deploy-mode "${{ steps.target.outputs.deploy_mode }}" \
            --api-url "${PRODUCTION_API_BASE_URL%/}/health" \
            --mcp-url "${PRODUCTION_MCP_BASE_URL%/}/health" \
            --public-base-url "${PRODUCTION_API_BASE_URL%/}" \
            --mcp-base-url "${PRODUCTION_MCP_BASE_URL%/}" \
            --website-base-url "${PRODUCTION_WEBSITE_BASE_URL%/}" \
            --base-mainnet-leaderboard-reward-contract "$BASE_MAINNET_LEADERBOARD_REWARD_CONTRACT" \
            --base-sepolia-leaderboard-reward-contract "$BASE_SEPOLIA_LEADERBOARD_REWARD_CONTRACT" \
            --output target/operations/render-deploy.json

      - name: Publish deployment evidence summary
        if: always() && steps.target.outputs.deploy == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          evidence_path = Path("target/operations/render-deploy.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          if not evidence_path.exists():
              summary_path.write_text(
                  "# Render deployment\n\nNo evidence was produced. Inspect the deploy step.\n",
                  encoding="utf-8",
              )
              raise SystemExit(0)
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          lines = [
              "# Render deployment",
              "",
              f"- Revision: `{evidence['revision']}`",
              f"- Deploy mode: `{evidence['deploy_mode']}`",
              f"- Verified: `{str(evidence['success']).lower()}`",
              f"- Services live: `{sum(item['status'] == 'live' for item in evidence['services'])}/3`",
              f"- Exact health attestations: `{len(evidence['health'])}/2`",
              f"- Public runtime variables reconciled: `{len(evidence.get('public_environment', []))}`",
              f"- Cloud runtime variables: `{len(evidence.get('cloud_environment', []))}/10`",
              f"- Cloud model credential supplied: `{bool(evidence.get('secret_environment'))}`",
              f"- Cloud drafting ready: `{bool(evidence.get('cloud_readiness', {}).get('available'))}`",
              f"- Neynar provider values reconciled: `{len(evidence.get('social_environment', []))}/5`",
              f"- Neynar webhook registered: `{bool(evidence.get('social_webhook', {}).get('active'))}`",
              f"- Social mention ingestion ready: `{bool(evidence.get('social_readiness', {}).get('enabled'))}`",
              f"- Leaderboard contracts ready: `{len(evidence.get('leaderboard_readiness', []))}`",
              "",
              "The controller can deploy application services only. It cannot deploy contracts, sign wallet transactions, or authorize settlement.",
          ]
          if evidence.get("error"):
              lines.extend(["", f"Failure: `{evidence['error']}`"])
          failure = evidence.get("failure") or {}
          if failure:
              logs = failure.get("build_logs") or {}
              lines.extend(
                  [
                      f"- Failed service: `{failure.get('service')}`",
                      f"- Render deploy: `{failure.get('deploy_id')}`",
                      f"- Render status: `{failure.get('status')}`",
                      f"- Build diagnostics: `{', '.join(logs.get('classifications', [])) or 'unavailable'}`",
                  ]
              )
              for excerpt in logs.get("excerpts", []):
                  lines.append(f"  - `{excerpt}`")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload redacted deployment evidence
        if: always() && steps.target.outputs.deploy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: render-deploy-${{ github.run_id }}
          path: target/operations/render-deploy.json
          if-no-files-found: error
          retention-days: 30
