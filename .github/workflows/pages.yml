name: Pages

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "deployments/bounded-agent-wallet-base-mainnet.json"
      - "site/**"
      - "scripts/check-site.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "deployments/bounded-agent-wallet-base-mainnet.json"
      - "site/**"
      - "scripts/check-site.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/check-site.py

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v6
      - name: Configure optional Google Analytics
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          if [[ -n "${GA_MEASUREMENT_ID}" && ! "${GA_MEASUREMENT_ID}" =~ ^G-[A-Z0-9]+$ ]]; then
            echo "GA_MEASUREMENT_ID must match G-[A-Z0-9]+" >&2
            exit 1
          fi
          printf 'window.agentBountiesAnalyticsConfig = Object.freeze({\n  googleMeasurementId: "%s",\n});\n' \
            "${GA_MEASUREMENT_ID}" > site/analytics-config.js
      - name: Stage bounded-wallet deployment manifest
        run: |
          cp deployments/bounded-agent-wallet-base-mainnet.json site/bounded-agent-wallet-base-mainnet.json
          mkdir -p site/schemas
          cp schemas/discovery-manifest.v2.json site/schemas/discovery-manifest.v2.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
