name: Pages

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "deployments/bounded-agent-wallet-base-mainnet.json"
      - "site/**"
      - "scripts/check-site.py"
      - "scripts/test-homepage-wallet-wiring.py"
      - "scripts/test-homepage-wallet-flow.js"
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "deployments/bounded-agent-wallet-base-mainnet.json"
      - "site/**"
      - "scripts/check-site.py"
      - "scripts/test-homepage-wallet-wiring.py"
      - "scripts/test-homepage-wallet-flow.js"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: python scripts/check-site.py
      - run: python scripts/test-homepage-wallet-wiring.py
      - run: node scripts/test-homepage-wallet-flow.js
      - name: Verify production analytics substitution preserves guild bootstrap
        env:
          GA_MEASUREMENT_ID: G-TEST123
        run: |
          cp site/analytics-config.js /tmp/analytics-config.js
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("/tmp/analytics-config.js")
          source = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'googleMeasurementId:\s*"(?:|G-[A-Z0-9]+)"',
              f'googleMeasurementId: "{os.environ["GA_MEASUREMENT_ID"]}"',
              source,
              count=1,
          )
          if count != 1:
              raise SystemExit("analytics configuration assignment was not found exactly once")
          if "loadGuildShell" not in updated or "guild-pages.css" not in updated or "guild-shell.js" not in updated:
              raise SystemExit("Pages analytics substitution removed the guild bootstrap")
          path.write_text(updated, encoding="utf-8")
          PY
          grep -q 'googleMeasurementId: "G-TEST123"' /tmp/analytics-config.js

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v6
      - name: Configure optional Google Analytics without removing the guild shell
        env:
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          if [[ -n "${GA_MEASUREMENT_ID}" && ! "${GA_MEASUREMENT_ID}" =~ ^G-[A-Z0-9]+$ ]]; then
            echo "GA_MEASUREMENT_ID must match G-[A-Z0-9]+" >&2
            exit 1
          fi
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("site/analytics-config.js")
          source = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'googleMeasurementId:\s*"(?:|G-[A-Z0-9]+)"',
              f'googleMeasurementId: "{os.environ.get("GA_MEASUREMENT_ID", "")}"',
              source,
              count=1,
          )
          if count != 1:
              raise SystemExit("analytics configuration assignment was not found exactly once")
          if "loadGuildShell" not in updated or "guild-pages.css" not in updated or "guild-shell.js" not in updated:
              raise SystemExit("refusing to deploy without the guild bootstrap")
          path.write_text(updated, encoding="utf-8")
          PY
      - name: Stage bounded-wallet deployment manifest
        run: |
          cp deployments/bounded-agent-wallet-base-mainnet.json site/bounded-agent-wallet-base-mainnet.json
          mkdir -p site/schemas
          cp schemas/discovery-manifest.v2.json site/schemas/discovery-manifest.v2.json
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
      - name: Verify canonical live guild deployment
        env:
          GH_TOKEN: ${{ github.token }}
          LIVE_CANARY_ISSUE: "499"
        run: |
          set -euo pipefail
          expected_build="$(head -n 1 site/live-guild-build.txt | tr -d '\r\n')"
          success=false
          attempt_used=0
          failure_detail="deployment has not propagated"

          for attempt in $(seq 1 60); do
            attempt_used="$attempt"
            nonce="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}-${attempt}-$(date +%s)"
            common_curl=(--fail --silent --show-error --location --retry 2 --retry-delay 1 --header "Cache-Control: no-cache" --header "Pragma: no-cache")

            if curl "${common_curl[@]}" "https://agentbounties.app/live-guild-build.txt?verify=${nonce}" -o /tmp/live-canary.txt \
              && curl "${common_curl[@]}" "https://agentbounties.app/earn.html?verify=${nonce}" -o /tmp/live-earn.html \
              && curl "${common_curl[@]}" "https://agentbounties.app/analytics-config.js?verify=${nonce}" -o /tmp/live-analytics.js; then
              actual_build="$(head -n 1 /tmp/live-canary.txt | tr -d '\r\n')"
              if [[ "${actual_build}" == "${expected_build}" ]] \
                && grep -q 'data-guild-build="20260722-1"' /tmp/live-earn.html \
                && grep -q '>Bounty Board</a>' /tmp/live-earn.html \
                && grep -q 'guild-pages.css?v=20260722-1' /tmp/live-earn.html \
                && grep -q 'loadGuildShell' /tmp/live-analytics.js \
                && grep -q 'guild-shell.js' /tmp/live-analytics.js; then
                success=true
                failure_detail=""
                break
              fi
              failure_detail="expected build ${expected_build}, received ${actual_build:-empty}, or guild markers were missing"
            else
              failure_detail="one or more live URLs returned a non-success response"
            fi
            sleep 5
          done

          verified_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "${success}" == "true" ]]; then
            cat > /tmp/live-proof.md <<EOF
          ✅ **Production guild canary passed**

          - Commit: \`${GITHUB_SHA}\`
          - Expected and live build: \`${expected_build}\`
          - Attempts: ${attempt_used}
          - Verified at: ${verified_at}
          - Live Bounty Board contains the static guild body marker, **Bounty Board** navigation, and cache-busted guild stylesheet.
          - Live analytics configuration still contains \`loadGuildShell\` and \`guild-shell.js\`.
          - Workflow: ${run_url}
          EOF
          else
            cat > /tmp/live-proof.md <<EOF
          ❌ **Production guild canary failed**

          - Commit: \`${GITHUB_SHA}\`
          - Expected build: \`${expected_build}\`
          - Attempts: ${attempt_used}
          - Last failure: ${failure_detail}
          - Checked at: ${verified_at}
          - Workflow: ${run_url}
          EOF
          fi

          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${LIVE_CANARY_ISSUE}/comments" --raw-field body="$(cat /tmp/live-proof.md)"
          [[ "${success}" == "true" ]]
