name: Bounded Wallet Gas Relay

on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read

concurrency:
  group: autonomous-gas-relay-base-mainnet
  cancel-in-progress: false

jobs:
  relay-create:
    if: >-
      github.event.issue.pull_request == null
      && contains(github.event.issue.labels.*.name, 'funding-needed')
      && !contains(github.event.issue.labels.*.name, 'verification-unavailable')
      && !contains(github.event.issue.labels.*.name, 'legacy-canary')
      && startsWith(github.event.comment.body, '/agent-bounty wallet-relay')
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5a

      - uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a

      - name: Validate, simulate, and sponsor the signed creation
        env:
          BASE_KEEPER_PRIVATE_KEY: ${{ secrets.BASE_KEEPER_PRIVATE_KEY }}
          BASE_MAINNET_RPC_URL: ${{ vars.BASE_MAINNET_RPC_URL || 'https://mainnet.base.org' }}
          GH_TOKEN: ${{ github.token }}
        run: >-
          python scripts/relay_bounded_wallet_action.py
          --event "$GITHUB_EVENT_PATH"
          --execute
          --publish

      - name: Reconcile a fully funded bounty into live discovery
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if python -c "import json,sys; sys.exit(0 if json.load(open('target/bounded-wallet-relay.json'))['claimable'] else 1)"; then
            gh issue edit "$ISSUE_NUMBER" --remove-label funding-needed --add-label funded-live --add-label claimable-live
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: bounded-wallet-gas-relay-${{ github.event.comment.id }}
          path: |
            target/bounded-wallet-relay.json
            target/bounded-wallet-relay.md
          if-no-files-found: warn
